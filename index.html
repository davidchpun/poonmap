<!DOCTYPE html>
<html>
<head>
    <title>Poon Family Map - Interactive Archive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .page-container { display: flex; flex-direction: column; height: 100vh; }

        .filter-bar { 
            background: #2c3e50; color: white; padding: 10px 15px; 
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center; 
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .filter-group { display: flex; flex-direction: column; }
        .label-row { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
        .filter-group label { font-size: 11px; color: #bdc3c7; text-transform: uppercase; }
        
        .inputs-row { display: flex; gap: 5px; align-items: center; }
        input[type="text"], input[type="number"] { padding: 6px 10px; border-radius: 4px; border: none; font-size: 13px; }
        input[type="text"] { width: 120px; }
        input[type="number"] { width: 65px; background: #ecf0f1; font-weight: bold; }
        input[type="checkbox"] { cursor: pointer; width: 14px; height: 14px; margin: 0; }

        #map { flex-grow: 1; width: 100%; background: #e0e0e0; }

        .popup-content { max-height: 280px; overflow-y: auto; width: 380px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f4f4f4; position: sticky; top: 0; cursor: pointer; user-select: none; }
        
        .clickable-name { color: #3498db; text-decoration: underline; cursor: pointer; font-weight: bold; }
        
        #record-count-container { margin-left: auto; display: flex; gap: 10px; align-items: center; }
        #record-count { font-weight: bold; background: #34495e; padding: 5px 10px; border-radius: 4px; }
        
        #exit-btn { 
            display: none; background: #e74c3c; color: white; border: none; 
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        #exit-btn:hover { background: #c0392b; }

        .unselect-btn {
            margin-top: 15px; 
            background: #e74c3c; color: white; border: none; 
            padding: 5px 10px; border-radius: 4px; cursor: pointer; 
            font-size: 11px; font-weight: bold; text-transform: uppercase;
        }
        .unselect-btn:hover { background: #c0392b; }

        /* Draggable Panel Styles */
        #draggable-bio-panel {
            display: none;
            position: absolute;
            top: 150px;
            left: 50px;
            width: 450px;
            background: white;
            border: 1px solid #2c3e50;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 2000;
            border-radius: 8px;
            overflow: hidden;
        }

        #panel-header {
            padding: 12px;
            cursor: move;
            background: #d35400;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #panel-body {
            padding: 15px;
            max-height: 450px;
            overflow-y: auto;
        }

        .close-panel {
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            line-height: 1;
        }

        .bio-header-badge { background: #e67e22; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-right: 8px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="filter-bar">
        <div class="filter-group">
            <div class="label-row"><input type="checkbox" id="nameActive" onchange="filterData()"><label for="nameActive">Name</label></div>
            <input type="text" id="nameInput" placeholder="Filter names..." oninput="document.getElementById('nameActive').checked = this.value.trim().length > 0; filterData()">
        </div>
        <div class="filter-group">
            <div class="label-row"><input type="checkbox" id="occActive" onchange="filterData()"><label for="occActive">Occupation</label></div>
            <input type="text" id="occInput" placeholder="Filter jobs..." oninput="document.getElementById('occActive').checked = this.value.trim().length > 0; filterData()">
        </div>
        <div class="filter-group">
            <div class="label-row"><input type="checkbox" id="birthActive" onchange="filterData()"><label for="birthActive">Birth Year</label></div>
            <div class="inputs-row">
                <input type="number" id="bMin" value="1840" oninput="handleInput('bMin', 'bMax')">
                <span>-</span>
                <input type="number" id="bMax" value="1860" oninput="handleInput('bMax', 'bMin')">
            </div>
        </div>
        <div class="filter-group">
            <div class="label-row"><input type="checkbox" id="issueActive" onchange="filterData()"><label for="issueActive">Issue Year</label></div>
            <div class="inputs-row">
                <input type="number" id="iMin" value="1900" oninput="handleInput('iMin', 'iMax')">
                <span>-</span>
                <input type="number" id="iMax" value="1920" oninput="handleInput('iMax', 'iMin')">
            </div>
        </div>
        <button class="unselect-btn" onclick="unselectAll()">Unselect All</button>

        <div id="record-count-container">
            <button id="exit-btn" onclick="exitIndividualView()">Exit Individual View</button>
            <div id="record-count">Initializing...</div>
        </div>
    </div>
    <div id="map"></div>
</div>

<div id="draggable-bio-panel">

        <span id="panel-title">Timeline</span>
        <span class="close-panel" onclick="closeDraggablePanel()">&times;</span>
    </div>
    <div id="panel-body"></div>
</div>

    function handleInput(changedId, targetId) {
        let currentVal = parseInt(document.getElementById(changedId).value) || 0;
        let prevVal = prevYears[changedId];
        let delta = currentVal - prevVal;
        
        if (delta !== 0) {
            let targetEl = document.getElementById(targetId);
            let newTargetVal = parseInt(targetEl.value) || 0;
            newTargetVal += delta;
            targetEl.value = newTargetVal;
            
            prevYears[changedId] = currentVal;
            prevYears[targetId] = newTargetVal;
        }
        filterData();
    }

    function unselectAll() {
        document.getElementById('nameActive').checked = false;
        document.getElementById('occActive').checked = false;
        document.getElementById('birthActive').checked = false;
        document.getElementById('issueActive').checked = false;
        
        document.getElementById('nameInput').value = '';
        document.getElementById('occInput').value = '';
        
        filterData();
    }

    function filterData() {
        const nameActive = document.getElementById('nameActive').checked;
        const occActive = document.getElementById('occActive').checked;
        const birthActive = document.getElementById('birthActive').checked;
        const issueActive = document.getElementById('issueActive').checked;

        const nameQ = document.getElementById('nameInput').value.toLowerCase();
        const occQ = document.getElementById('occInput').value.toLowerCase();
        const bMin = parseInt(document.getElementById('bMin').value) || 0;
        const bMax = parseInt(document.getElementById('bMax').value) || 3000;
        const iMin = parseInt(document.getElementById('iMin').value) || 0;
        const iMax = parseInt(document.getElementById('iMax').value) || 3000;

        currentFilteredData = allData.filter(p => {
            const bYear = parseInt(p['Year of birth']) || null;
            const iYear = parseInt(p['Year issued']) || null;
            const mName = !nameActive || (p.Name || "").toLowerCase().includes(nameQ);
            const mOcc = !occActive || (p.Occupation || "").toLowerCase().includes(occQ);
            const mBirth = !birthActive || (bYear !== null && bYear >= bMin && bYear <= bMax);
            const mIssue = !issueActive || (iYear !== null && iYear >= iMin && iYear <= iMax);
            return mName && mOcc && mBirth && mIssue;
        });

        updateMap(currentFilteredData);
    }

    function updateMap(data) {
        circleLayer.clearLayers();
        const isSinglePersonMode = document.getElementById('exit-btn').style.display === 'block';

        const groups = {};
        data.forEach(p => {
            if (!p.lat || !p.lng) return;
            const loc = p.Residence || "Unknown";
            if (!groups[loc]) groups[loc] = { coords: [p.lat, p.lng], people: [] };
            groups[loc].people.push(p);
        });

        Object.keys(groups).forEach(city => {
            const grp = groups[city];
            const circle = L.circle(grp.coords, {
                color: isSinglePersonMode ? '#e67e22' : '#2c3e50', 
                fillColor: isSinglePersonMode ? '#f39c12' : '#3498db', 
                fillOpacity: 0.6, 
                radius: Math.sqrt(grp.people.length) * 2000
            }).addTo(circleLayer);
            
            circle.bindPopup(() => generatePopupHTML(city, isSinglePersonMode ? data : grp.people, isSinglePersonMode), { minWidth: 380, maxWidth: 380 });
        });

        if (isSinglePersonMode && data.length > 0) {
            const panel = document.getElementById("draggable-bio-panel");
            const body = document.getElementById("panel-body");
            const title = document.getElementById("panel-title");
            
            title.innerText = data[0].Name;
            body.innerHTML = generatePopupHTML("", data, true);
            panel.style.display = "block";
        } else {
            closeDraggablePanel();
        }

        document.getElementById('record-count').innerText = `${data.length} Records Found`;
    }

    function generatePopupHTML(city, people, isSinglePersonMode) {
        if (sortState.column) {
            people.sort((a, b) => {
                let vA = parseInt(a[sortState.column]) || 0;
                let vB = parseInt(b[sortState.column]) || 0;
                return sortState.ascending ? vA - vB : vB - vA;
            });
        }
        let rows = people.map(p => `<tr><td><span class="clickable-name" onclick="selectIndividual('${p.Name}')">${p.Name}</span></td><td>${p.Occupation || 'N/A'}</td><td>${p['Year of birth'] || 'N/A'}</td><td>${p['Year issued'] || 'N/A'}</td>${isSinglePersonMode ? `<td>${p.Residence || 'N/A'}</td>` : ''}</tr>`).join('');
        
        const title = isSinglePersonMode ? 
            `<span class="bio-header-badge">INDIVIDUAL TIMELINE</span>` : 
            `<strong>${city}</strong> (${people.length} entries)`;
            
        return `<div class="popup-content">${title}<table><thead><tr><th>Name</th><th>Occ.</th><th onclick="resortPopup('${city}', 'Year of birth', ${isSinglePersonMode})">Birth</th><th onclick="resortPopup('${city}', 'Year issued', ${isSinglePersonMode})">Issued</th>${isSinglePersonMode ? '<th>Residence</th>' : ''}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    window.selectIndividual = function(name) {
        filterMemory = {
            nameVal: document.getElementById('nameInput').value,
            nameAct: document.getElementById('nameActive').checked,
            occVal: document.getElementById('occInput').value,
            occAct: document.getElementById('occActive').checked,
            bMin: document.getElementById('bMin').value,
            bMax: document.getElementById('bMax').value,
            bAct: document.getElementById('birthActive').checked,
            iMin: document.getElementById('iMin').value,
            iMax: document.getElementById('iMax').value,
            iAct: document.getElementById('issueActive').checked
        };

        document.getElementById('nameInput').value = name;
        document.getElementById('nameActive').checked = true;
        
        document.getElementById('birthActive').checked = false;
        
        document.getElementById('exit-btn').style.display = 'block';
        filterData();
    };

    window.exitIndividualView = function() {
        if (filterMemory) {
            document.getElementById('nameInput').value = filterMemory.nameVal;
            document.getElementById('nameActive').checked = filterMemory.nameAct;
            document.getElementById('occInput').value = filterMemory.occVal;
            document.getElementById('occActive').checked = filterMemory.occAct;
            document.getElementById('bMin').value = filterMemory.bMin;
            document.getElementById('bMax').value = filterMemory.bMax;
            document.getElementById('birthActive').checked = filterMemory.bAct;
            document.getElementById('iMin').value = filterMemory.iMin;
            document.getElementById('iMax').value = filterMemory.iMax;
            document.getElementById('issueActive').checked = filterMemory.iAct;
        }
        document.getElementById('exit-btn').style.display = 'none';
        filterData();
    };

    function closeDraggablePanel() {
        document.getElementById("draggable-bio-panel").style.display = "none";
    }

    function makeDraggable(el) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        const header = document.getElementById("panel-header");
        header.onmousedown = (e) => {
            e.preventDefault();
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                e.preventDefault();
                p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px";
                el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }
    makeDraggable(document.getElementById("draggable-bio-panel"));

    filterData();
</script>
